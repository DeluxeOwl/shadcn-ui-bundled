<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>shadcn-ui-bundled — Custom Theme Demo</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:is(.dark *));
    @theme inline {
      --font-sans: ui-sans-serif, system-ui, sans-serif;
      --color-background: var(--background);
      --color-foreground: var(--foreground);
      --color-primary: var(--primary);
      --color-primary-foreground: var(--primary-foreground);
      --color-secondary: var(--secondary);
      --color-secondary-foreground: var(--secondary-foreground);
      --color-muted: var(--muted);
      --color-muted-foreground: var(--muted-foreground);
      --color-accent: var(--accent);
      --color-accent-foreground: var(--accent-foreground);
      --color-destructive: var(--destructive);
      --color-popover: var(--popover);
      --color-popover-foreground: var(--popover-foreground);
      --color-card: var(--card);
      --color-card-foreground: var(--card-foreground);
      --color-border: var(--border);
      --color-input: var(--input);
      --color-ring: var(--ring);
      --radius-sm: calc(var(--radius) * 0.6);
      --radius-md: calc(var(--radius) * 0.8);
      --radius-lg: var(--radius);
      --radius-xl: calc(var(--radius) * 1.4);
      --radius-2xl: calc(var(--radius) * 1.8);
    }

    /*
     * ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     * THEME CUSTOMIZATION — just override CSS vars!
     * ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     *
     * All shadcn components read from these vars.
     * Change them here and everything updates.
     *
     * Use https://oklch.com/ to pick colors, or
     * https://ui.shadcn.com/themes for presets.
     */
    :root {
      /* 🎨 Blue theme */
      --background: oklch(0.99 0.005 250);
      --foreground: oklch(0.18 0.03 260);
      --primary: oklch(0.55 0.22 260);         /* vivid blue */
      --primary-foreground: oklch(0.98 0.005 250);
      --secondary: oklch(0.93 0.02 250);
      --secondary-foreground: oklch(0.25 0.04 260);
      --muted: oklch(0.95 0.015 250);
      --muted-foreground: oklch(0.50 0.03 260);
      --accent: oklch(0.92 0.04 250);
      --accent-foreground: oklch(0.25 0.04 260);
      --destructive: oklch(0.58 0.24 27);
      --popover: oklch(1 0 0);
      --popover-foreground: oklch(0.18 0.03 260);
      --card: oklch(1 0 0);
      --card-foreground: oklch(0.18 0.03 260);
      --border: oklch(0.88 0.03 250);
      --input: oklch(0.88 0.03 250);
      --ring: oklch(0.55 0.22 260);
      --radius: 0.75rem;                       /* rounder corners */
    }
    .dark {
      --background: oklch(0.16 0.03 260);
      --foreground: oklch(0.95 0.01 250);
      --primary: oklch(0.65 0.22 260);
      --primary-foreground: oklch(0.15 0.03 260);
      --secondary: oklch(0.25 0.04 260);
      --secondary-foreground: oklch(0.95 0.01 250);
      --muted: oklch(0.25 0.04 260);
      --muted-foreground: oklch(0.65 0.03 250);
      --accent: oklch(0.30 0.06 260);
      --accent-foreground: oklch(0.95 0.01 250);
      --destructive: oklch(0.70 0.19 22);
      --popover: oklch(0.20 0.04 260);
      --popover-foreground: oklch(0.95 0.01 250);
      --card: oklch(0.20 0.04 260);
      --card-foreground: oklch(0.95 0.01 250);
      --border: oklch(0.30 0.04 260);
      --input: oklch(0.30 0.04 260);
      --ring: oklch(0.65 0.22 260);
    }
    @layer base {
      * { @apply border-border outline-ring/50; }
      body { @apply bg-background text-foreground; }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19",
      "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime",
      "react/jsx-dev-runtime": "https://esm.sh/react@19/jsx-dev-runtime",
      "react-dom": "https://esm.sh/react-dom@19",
      "react-dom/client": "https://esm.sh/react-dom@19/client",
      "shadcn": "https://esm.sh/shadcn-ui-bundled/standalone"
    }
  }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset("tsx-auto", {
      presets: [
        [Babel.availablePresets["react"], { runtime: "automatic" }],
        [Babel.availablePresets["typescript"], { isTSX: true, allExtensions: true }],
      ],
    });
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="tsx-auto">
    import { useState } from "react";
    import { createRoot } from "react-dom/client";
    import {
      Button, Card, CardHeader, CardTitle, CardDescription, CardContent,
      Input, Label, Badge, Separator, Switch, Tabs, TabsList, TabsTrigger, TabsContent,
    } from "shadcn";

    // Predefined themes — just CSS custom property overrides
    const themes = {
      blue: {
        "--primary": "oklch(0.55 0.22 260)",
        "--primary-foreground": "oklch(0.98 0.005 250)",
        "--accent": "oklch(0.92 0.04 250)",
        "--ring": "oklch(0.55 0.22 260)",
        "--radius": "0.75rem",
      },
      green: {
        "--primary": "oklch(0.55 0.17 155)",
        "--primary-foreground": "oklch(0.98 0.01 155)",
        "--accent": "oklch(0.92 0.04 155)",
        "--ring": "oklch(0.55 0.17 155)",
        "--radius": "0.5rem",
      },
      rose: {
        "--primary": "oklch(0.60 0.20 15)",
        "--primary-foreground": "oklch(0.98 0.005 15)",
        "--accent": "oklch(0.93 0.04 15)",
        "--ring": "oklch(0.60 0.20 15)",
        "--radius": "1rem",
      },
      amber: {
        "--primary": "oklch(0.75 0.18 75)",
        "--primary-foreground": "oklch(0.20 0.04 75)",
        "--accent": "oklch(0.92 0.06 75)",
        "--ring": "oklch(0.75 0.18 75)",
        "--radius": "0.25rem",
      },
      neutral: {
        "--primary": "oklch(0.205 0 0)",
        "--primary-foreground": "oklch(0.985 0 0)",
        "--accent": "oklch(0.97 0 0)",
        "--ring": "oklch(0.708 0 0)",
        "--radius": "0.625rem",
      },
    };

    function App() {
      const [theme, setTheme] = useState("blue");
      const [darkMode, setDarkMode] = useState(false);

      const applyTheme = (name: string) => {
        setTheme(name);
        const vars = themes[name as keyof typeof themes];
        for (const [prop, value] of Object.entries(vars)) {
          document.documentElement.style.setProperty(prop, value);
        }
      };

      return (
        <div className={darkMode ? "dark" : ""}>
          <div className="min-h-screen bg-background text-foreground transition-colors">
            <div className="max-w-2xl mx-auto py-12 px-4 space-y-8">

              <div className="flex items-center justify-between">
                <div>
                  <h1 className="text-3xl font-bold tracking-tight">Theme Customization</h1>
                  <p className="text-muted-foreground mt-1">Override CSS variables — everything updates</p>
                </div>
                <div className="flex items-center gap-2">
                  <Label htmlFor="dark" className="text-sm">Dark</Label>
                  <Switch id="dark" checked={darkMode} onCheckedChange={setDarkMode} />
                </div>
              </div>

              <Separator />

              {/* Theme picker */}
              <Card>
                <CardHeader>
                  <CardTitle>Pick a theme</CardTitle>
                  <CardDescription>Each is just ~5 CSS custom properties</CardDescription>
                </CardHeader>
                <CardContent className="flex flex-wrap gap-2">
                  {Object.keys(themes).map(name => (
                    <Button
                      key={name}
                      variant={theme === name ? "default" : "outline"}
                      onClick={() => applyTheme(name)}
                      className="capitalize"
                    >
                      {name}
                    </Button>
                  ))}
                </CardContent>
              </Card>

              {/* Preview */}
              <Card>
                <CardHeader>
                  <CardTitle>Preview</CardTitle>
                </CardHeader>
                <CardContent className="space-y-4">
                  <div className="flex flex-wrap gap-2">
                    <Button>Primary</Button>
                    <Button variant="secondary">Secondary</Button>
                    <Button variant="outline">Outline</Button>
                    <Button variant="ghost">Ghost</Button>
                    <Button variant="destructive">Destructive</Button>
                  </div>
                  <div className="flex gap-2">
                    <Badge>Badge</Badge>
                    <Badge variant="secondary">Secondary</Badge>
                    <Badge variant="outline">Outline</Badge>
                  </div>
                  <div className="space-y-2">
                    <Label>Email</Label>
                    <Input placeholder="you@example.com" />
                  </div>
                </CardContent>
              </Card>

              <Tabs defaultValue="code">
                <TabsList>
                  <TabsTrigger value="code">Theme Code</TabsTrigger>
                  <TabsTrigger value="how">How it works</TabsTrigger>
                </TabsList>
                <TabsContent value="code" className="mt-4">
                  <pre className="bg-muted rounded-lg p-4 text-sm overflow-x-auto">
{`:root {
${Object.entries(themes[theme as keyof typeof themes])
  .map(([k, v]) => `  ${k}: ${v};`)
  .join('\n')}
}`}
                  </pre>
                </TabsContent>
                <TabsContent value="how" className="mt-4">
                  <div className="text-sm text-muted-foreground space-y-2">
                    <p>All shadcn components use Tailwind classes like <code className="bg-muted px-1 rounded">bg-primary</code>, which resolve to CSS custom properties.</p>
                    <p>Override <code className="bg-muted px-1 rounded">--primary</code> and every component using <code className="bg-muted px-1 rounded">bg-primary</code> updates automatically.</p>
                    <p>Use <a href="https://oklch.com" className="underline text-primary">oklch.com</a> to pick colors in OKLCH format, or grab presets from <a href="https://ui.shadcn.com/themes" className="underline text-primary">ui.shadcn.com/themes</a>.</p>
                  </div>
                </TabsContent>
              </Tabs>

            </div>
          </div>
        </div>
      );
    }

    createRoot(document.getElementById("root")!).render(<App />);
  </script>
</body>
</html>
